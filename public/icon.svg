<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Jonte">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#20242d"/>
      <stop offset="100%" stop-color="#15171c"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="44" fill="#ff8a1e" opacity="0.28" filter="url(#glow)"/>

  <g stroke-linecap="round" fill="none" stroke-width="21">
    <!-- Boden -->
    <line x1="256" y1="256" x2="335.7" y2="302" stroke="#e2231a"/>
    <line x1="335.7" y1="302" x2="256" y2="348" stroke="#0061b0"/>
    <line x1="256" y1="348" x2="176.3" y2="302" stroke="#ffc60b"/>
    <line x1="176.3" y1="302" x2="256" y2="256" stroke="#00963f"/>
    <!-- Steher -->
    <line x1="256" y1="256" x2="256" y2="164" stroke="#0061b0"/>
    <line x1="335.7" y1="302" x2="335.7" y2="210" stroke="#00963f"/>
    <line x1="256" y1="348" x2="256" y2="256" stroke="#e2231a"/>
    <line x1="176.3" y1="302" x2="176.3" y2="210" stroke="#ffc60b"/>
    <!-- Deckel -->
    <line x1="256" y1="164" x2="335.7" y2="210" stroke="#00963f"/>
    <line x1="335.7" y1="210" x2="256" y2="256" stroke="#ffc60b"/>
    <line x1="256" y1="256" x2="176.3" y2="210" stroke="#e2231a"/>
    <line x1="176.3" y1="210" x2="256" y2="164" stroke="#0061b0"/>
  </g>

  <!-- Verbinder -->
  <g fill="#0f1116" stroke="#3a4150" stroke-width="3">
    <circle cx="335.7" cy="302" r="13"/>
    <circle cx="256" cy="348" r="13"/>
    <circle cx="176.3" cy="302" r="13"/>
    <circle cx="256" cy="164" r="13"/>
    <circle cx="335.7" cy="210" r="13"/>
    <circle cx="176.3" cy="210" r="13"/>
  </g>
  <!-- leuchtender Verbinder (aktueller Schritt) -->
  <circle cx="256" cy="256" r="15" fill="#ff8a1e"/>
</svg>
